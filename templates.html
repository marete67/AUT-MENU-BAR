<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Menu Bar · Plantillas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --bg:#060d24; --s0:#0f1834; --s1:#151e3c; --s2:#1a2547; --accent:#9effc8; --accent-dim:#00ec9a; --text:#e8edf8; --dim:#6b7a99; --error:#d7383b; --r:6px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ===== HEADER ===== */
header {
  position:sticky; top:0; z-index:100;
  height:56px; padding:0 24px; background:var(--s0);
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex; align-items:center; gap:16px;
}
.logo { font-family:'Manrope',sans-serif; font-size:15px; font-weight:700; }
.logo span { color:var(--accent); }
.hdr-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.hdr-user { font-size:12px; color:var(--dim); }
.hdr-btn {
  padding:6px 14px; border-radius:var(--r); border:1px solid rgba(255,255,255,0.1);
  background:transparent; color:var(--dim); cursor:pointer;
  font-size:12px; font-family:'Manrope',sans-serif; font-weight:600;
  transition:all 0.15s; letter-spacing:0.05em;
}
.hdr-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.25); }
.hdr-btn.primary {
  background:linear-gradient(135deg,var(--accent-dim),var(--accent));
  color:#060d24; border-color:transparent; font-weight:700;
  box-shadow:0 0 16px rgba(0,236,154,0.2);
}
.hdr-btn.primary:hover { opacity:0.9; box-shadow:0 0 24px rgba(0,236,154,0.35); }

/* ===== LIST VIEW ===== */
#view-list { padding:32px 24px; max-width:960px; margin:0 auto; }
.page-title { font-family:'Manrope',sans-serif; font-size:22px; font-weight:700; margin-bottom:24px; }
.page-title span { color:var(--accent); }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }

.tmpl-card {
  background:var(--s0); border-radius:10px; padding:20px;
  border:1px solid rgba(255,255,255,0.05);
  display:flex; flex-direction:column; gap:12px;
  transition:border-color 0.15s, transform 0.15s;
}
.tmpl-card:hover { border-color:rgba(158,255,200,0.15); transform:translateY(-1px); }

.tmpl-card-top { display:flex; align-items:flex-start; gap:8px; }
.tmpl-name { font-family:'Manrope',sans-serif; font-size:15px; font-weight:600; flex:1; }
.menu-wrap { position:relative; flex-shrink:0; }
.menu-btn {
  width:28px; height:28px; border-radius:var(--r); border:none;
  background:transparent; color:var(--dim); cursor:pointer;
  font-size:16px; font-weight:700; display:flex; align-items:center; justify-content:center;
  transition:background 0.1s; letter-spacing:0.05em;
}
.menu-btn:hover { background:var(--s2); color:var(--text); }
.dropdown {
  display:none; position:absolute; right:0; top:32px; z-index:50;
  background:var(--s1); border-radius:var(--r);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  min-width:140px; overflow:hidden;
}
.dropdown.open { display:block; }
.dropdown button {
  width:100%; padding:10px 14px; background:transparent; border:none;
  color:var(--text); text-align:left; cursor:pointer; font-size:13px;
  font-family:'Inter',sans-serif; transition:background 0.1s;
  display:block;
}
.dropdown button:hover { background:var(--s2); }
.dropdown button.del { color:var(--error); }

.tmpl-info { font-size:12px; color:var(--dim); }

.btn-generar {
  padding:10px; border-radius:var(--r); border:none; cursor:pointer;
  background:linear-gradient(135deg,var(--accent-dim),var(--accent));
  color:#060d24; font-size:13px; font-weight:700;
  font-family:'Manrope',sans-serif; letter-spacing:0.05em;
  box-shadow:0 0 16px rgba(0,236,154,0.15);
  transition:opacity 0.15s, box-shadow 0.15s;
}
.btn-generar:hover { opacity:0.9; box-shadow:0 0 24px rgba(0,236,154,0.3); }

.empty {
  grid-column:1/-1; text-align:center; padding:64px 0;
  color:var(--dim); font-size:14px; line-height:2;
}
.empty strong { display:block; font-family:'Manrope',sans-serif; font-size:18px; color:var(--text); margin-bottom:8px; }

/* ===== FORM VIEW ===== */
#view-form {
  display:none; max-width:560px; margin:0 auto; padding:32px 24px;
}
.back-btn {
  display:inline-flex; align-items:center; gap:6px;
  font-size:13px; color:var(--dim); cursor:pointer; background:none; border:none;
  font-family:'Inter',sans-serif; padding:0; margin-bottom:24px;
  transition:color 0.15s;
}
.back-btn:hover { color:var(--text); }

.form-title { font-family:'Manrope',sans-serif; font-size:22px; font-weight:700; margin-bottom:6px; }
.form-subtitle { font-size:13px; color:var(--dim); margin-bottom:28px; }

.form-card { background:var(--s0); border-radius:10px; padding:20px; border:1px solid rgba(255,255,255,0.05); margin-bottom:16px; display:flex; flex-direction:column; gap:12px; }
.form-card-title { font-family:'Manrope',sans-serif; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:var(--accent-dim); }

.form-field { display:flex; flex-direction:column; gap:4px; }
.form-field label { font-size:12px; color:var(--dim); }
.form-field input, .form-field textarea {
  background:var(--s1); border:none; border-bottom:2px solid transparent;
  color:var(--text); padding:9px 10px; border-radius:var(--r) var(--r) 0 0;
  font-size:13px; font-family:'Inter',sans-serif; outline:none; width:100%;
  transition:border-color 0.15s;
}
.form-field input:focus, .form-field textarea:focus { border-bottom-color:var(--accent-dim); }
.form-field textarea { min-height:80px; resize:vertical; }
input[type="file"] {
  font-size:12px; color:var(--dim); background:var(--s1);
  border:1.5px dashed rgba(158,255,200,0.2); padding:9px 10px;
  border-radius:var(--r); width:100%; cursor:pointer; font-family:'Inter',sans-serif;
}

.render-btn {
  width:100%; padding:13px; border-radius:var(--r); border:none; cursor:pointer;
  background:linear-gradient(135deg,var(--accent-dim),var(--accent));
  color:#060d24; font-size:14px; font-weight:700; font-family:'Manrope',sans-serif;
  letter-spacing:0.05em; box-shadow:0 0 20px rgba(0,236,154,0.2);
  transition:opacity 0.15s, box-shadow 0.15s;
}
.render-btn:hover:not(:disabled) { opacity:0.9; box-shadow:0 0 32px rgba(0,236,154,0.35); }
.render-btn:disabled { background:var(--s2); color:var(--dim); box-shadow:none; cursor:not-allowed; }

.form-status { font-size:12px; color:var(--dim); min-height:16px; }
.form-status.ok { color:var(--accent-dim); }
.form-status.err { color:var(--error); }

#form-result-img { width:100%; border-radius:var(--r); display:none; margin-top:8px; }
#form-dl { display:none; text-align:center; font-size:12px; color:var(--accent-dim); text-decoration:none; padding:8px; font-family:'Manrope',sans-serif; }

/* ===== EMAIL SECTION ===== */
#email-section { display:none; }
.email-tabs { display:flex; gap:8px; margin-bottom:4px; }
.email-tab {
  flex:1; padding:9px 8px; border-radius:var(--r); border:1px solid rgba(255,255,255,0.15);
  background:transparent; color:var(--dim); cursor:pointer;
  font-size:12px; font-family:'Manrope',sans-serif; font-weight:600;
  letter-spacing:0.04em; transition:all 0.15s;
}
.email-tab.active {
  background:linear-gradient(135deg,var(--accent-dim),var(--accent));
  color:#060d24; border-color:transparent;
}
.email-panel { display:none; flex-direction:column; gap:12px; }
.email-panel.active { display:flex; }
.email-send-btn {
  padding:10px; border-radius:var(--r); border:none; cursor:pointer;
  background:linear-gradient(135deg,#3b6fd4,#5b8ff9);
  color:#fff; font-size:13px; font-weight:700;
  font-family:'Manrope',sans-serif; letter-spacing:0.05em;
  transition:opacity 0.15s;
}
.email-send-btn:hover:not(:disabled) { opacity:0.85; }
.email-send-btn:disabled { background:var(--s2); color:var(--dim); cursor:not-allowed; }
.scheduled-list { display:flex; flex-direction:column; gap:6px; }
.scheduled-item {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--s2); border-radius:var(--r); padding:8px 10px;
  font-size:12px; gap:8px;
}
.scheduled-item-info { flex:1; color:var(--dim); line-height:1.5; }
.scheduled-item-info strong { color:var(--text); }
.scheduled-cancel {
  background:none; border:none; color:var(--error); cursor:pointer;
  font-size:18px; line-height:1; padding:0 4px;
}
</style>
</head>
<body>

<header>
  <div class="logo"><span>[</span> MENU BAR <span>]</span></div>
  <div class="hdr-right">
    <span class="hdr-user" id="hdr-user"></span>
    <div id="ig-header" style="display:flex;align-items:center;gap:8px;"></div>
    <button class="hdr-btn primary" onclick="location.href='/editor.html'">+ Nueva plantilla</button>
    <button class="hdr-btn" id="btn-logout">Salir</button>
  </div>
</header>

<!-- LISTA -->
<div id="view-list">
  <div class="page-title">Mis <span>Plantillas</span></div>
  <div class="grid" id="grid"></div>
</div>

<!-- FORMULARIO -->
<div id="view-form">
  <button class="back-btn" id="back-btn">← Volver a plantillas</button>
  <div class="form-title" id="form-title"></div>
  <div class="form-subtitle">Rellena los campos y genera la imagen</div>
  <div id="form-body"></div>

  <!-- PANEL INSTAGRAM -->
  <div id="ig-section" style="display:none">
    <div class="form-card">
      <div class="form-card-title">Publicar en Instagram Stories</div>
      <div id="ig-section-body"></div>
    </div>
    <div class="form-card" id="ig-scheduled-card" style="display:none">
      <div class="form-card-title">Publicaciones programadas</div>
      <div class="scheduled-list" id="ig-scheduled-list"></div>
    </div>
  </div>

  <!-- PANEL CORREO -->
  <div id="email-section">
    <div class="form-card">
      <div class="form-card-title">Enviar por correo</div>
      <div class="email-tabs">
        <button class="email-tab active" id="tab-now" onclick="switchEmailTab('now')">Enviar ahora</button>
        <button class="email-tab" id="tab-schedule" onclick="switchEmailTab('schedule')">Programar envío</button>
      </div>

      <!-- Campos comunes -->
      <div class="form-field">
        <label>Destinatario</label>
        <input type="email" id="email-to" placeholder="correo@destino.com">
      </div>
      <div class="form-field">
        <label>Asunto</label>
        <input type="text" id="email-subject" placeholder="Menú del día">
      </div>

      <!-- Panel: ahora -->
      <div class="email-panel active" id="panel-now">
        <div class="form-status" id="email-status-now"></div>
        <button class="email-send-btn" id="btn-send-now" onclick="sendEmailNow()">ENVIAR AHORA</button>
      </div>

      <!-- Panel: programar -->
      <div class="email-panel" id="panel-schedule">
        <div class="form-field">
          <label>Fecha y hora de envío</label>
          <input type="datetime-local" id="email-send-at">
        </div>
        <div class="form-status" id="email-status-schedule"></div>
        <button class="email-send-btn" id="btn-schedule" onclick="scheduleEmail()">PROGRAMAR ENVÍO</button>
      </div>
    </div>

    <!-- Lista de envíos programados pendientes -->
    <div class="form-card" id="scheduled-card" style="display:none">
      <div class="form-card-title">Envíos programados</div>
      <div class="scheduled-list" id="scheduled-list"></div>
    </div>
  </div>
</div>

<script>
// ===== AUTH =====
const token = localStorage.getItem('token');
if (!token) location.href = '/login.html';
document.getElementById('hdr-user').textContent = localStorage.getItem('username') || '';

document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.removeItem('token'); localStorage.removeItem('username');
  location.href = '/login.html';
});

function api(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) },
    body: opts.body ? (typeof opts.body === 'string' ? opts.body : JSON.stringify(opts.body)) : undefined,
  });
}

// ===== LOAD TEMPLATES =====
let templates = [];

async function loadTemplates() {
  const res = await api('/api/templates');
  if (res.status === 401) { location.href = '/login.html'; return; }
  templates = await res.json();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!templates.length) {
    grid.innerHTML = `<div class="empty"><strong>Sin plantillas</strong>Crea tu primera plantilla con el botón "+ Nueva plantilla"</div>`;
    return;
  }

  for (const t of templates) {
    const card = document.createElement('div');
    card.className = 'tmpl-card';
    const date = new Date(t.updated_at).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
    card.innerHTML = `
      <div class="tmpl-card-top">
        <div class="tmpl-name">${t.name}</div>
        <div class="menu-wrap">
          <button class="menu-btn" data-id="${t.id}">···</button>
          <div class="dropdown" id="dd-${t.id}">
            <button onclick="editTemplate(${t.id})">Editar</button>
            <button class="del" onclick="deleteTemplate(${t.id})">Eliminar</button>
          </div>
        </div>
      </div>
      <div class="tmpl-info">Actualizada ${date}</div>
      <button class="btn-generar" onclick="openForm(${t.id})">GENERAR MENÚ</button>`;
    grid.appendChild(card);
  }

  // Cerrar dropdowns al hacer click fuera
  document.addEventListener('click', e => {
    if (!e.target.classList.contains('menu-btn')) {
      document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
    }
  });
  document.querySelectorAll('.menu-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
      document.getElementById(`dd-${btn.dataset.id}`).classList.toggle('open');
    });
  });
}

function editTemplate(id) { location.href = `/editor.html?id=${id}`; }

async function deleteTemplate(id) {
  if (!confirm('¿Eliminar esta plantilla?')) return;
  await api(`/api/templates/${id}`, { method: 'DELETE' });
  templates = templates.filter(t => t.id !== id);
  renderGrid();
}

// ===== FORM VIEW =====
let currentTemplate = null;
let formState = {};

async function openForm(id) {
  const res = await api(`/api/templates/${id}`);
  const tpl = await res.json();
  currentTemplate = tpl;
  formState = {};

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-form').style.display = 'block';
  document.getElementById('form-title').textContent = tpl.name;

  buildForm(tpl.config);
}

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
  document.getElementById('email-section').style.display = 'none';
  document.getElementById('ig-section').style.display = 'none';
  currentTemplate = null; formState = {}; currentRenderConfig = null;
});

function getFmtConfig(config, fmt) {
  // New multi-format structure or legacy fallback
  return config[fmt] ?? config;
}

function getAvailableFormats(config) {
  if (config.story || config.folio) {
    const out = [];
    if (config.story?.blocks?.length) out.push('story');
    if (config.folio?.blocks?.length) out.push('folio');
    return out.length ? out : ['story'];
  }
  return [config.formato ?? 'story'];
}

function buildDynamicSection(config, fmt, container) {
  container.innerHTML = '';
  const fmtConfig = getFmtConfig(config, fmt);
  const varBlocks = (fmtConfig.blocks ?? []).filter(b => b.type === 'variable');

  if (!fmtConfig.fondo_locked || !fmtConfig.fondo_b64) {
    const card = makeCard('Fondo');
    const ff = field('Imagen de fondo', `<input type="file" id="ff-fondo" accept="image/*">`);
    card.appendChild(ff);
    container.appendChild(card);
    document.getElementById('ff-fondo').addEventListener('change', async e => {
      const f = e.target.files[0]; if (!f) return;
      formState.fondo_b64 = await toB64(f);
    });
  }

  if (varBlocks.length) {
    const card = makeCard('Campos del menú');
    for (const b of varBlocks) {
      const inputId = `ff-${b.key}`;
      const inputHtml = b.multiline
        ? `<textarea id="${inputId}" placeholder="${b.label}..."></textarea>`
        : `<input type="text" id="${inputId}" placeholder="${b.label}...">`;
      card.appendChild(field(b.label, inputHtml));
    }
    container.appendChild(card);
  }
}

function buildForm(config) {
  const body = document.getElementById('form-body');
  body.innerHTML = '';

  const available = getAvailableFormats(config);
  const FMT_LABELS = { story: 'Story Instagram (1080×1920)', folio: 'A4 / Folio (2480×3508)' };
  formState.selectedFormat = available[0];
  formState.fondo_b64 = null;

  // Format selector (always visible)
  const fmtCard = makeCard('Formato de exportación');
  const fmtBtns = document.createElement('div');
  fmtBtns.style.cssText = 'display:flex;gap:8px;';
  const ALL_FMTS = ['story', 'folio'];
  for (const fmt of ALL_FMTS) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.dataset.fmt = fmt;
    btn.textContent = FMT_LABELS[fmt] ?? fmt;
    const isAvailable = available.includes(fmt);
    btn.style.cssText = `flex:1;padding:10px 8px;border-radius:var(--r);border:1px solid;cursor:${isAvailable ? 'pointer' : 'not-allowed'};font-size:12px;font-family:'Manrope',sans-serif;font-weight:600;letter-spacing:0.04em;transition:all 0.15s;opacity:${isAvailable ? '1' : '0.35'};`;
    if (!isAvailable) btn.disabled = true;
    btn.addEventListener('click', () => {
      if (!isAvailable) return;
      formState.selectedFormat = fmt;
      formState.fondo_b64 = null;
      fmtBtns.querySelectorAll('button').forEach(b => {
        const active = b.dataset.fmt === fmt;
        b.style.background = active ? 'linear-gradient(135deg,var(--accent-dim),var(--accent))' : 'transparent';
        b.style.color = active ? '#060d24' : 'var(--dim)';
        b.style.borderColor = active ? 'transparent' : 'rgba(255,255,255,0.15)';
      });
      buildDynamicSection(config, fmt, dynamicDiv);
    });
    fmtBtns.appendChild(btn);
  }
  // Set initial active state
  fmtBtns.querySelectorAll('button').forEach(b => {
    const active = b.dataset.fmt === formState.selectedFormat;
    b.style.background = active ? 'linear-gradient(135deg,var(--accent-dim),var(--accent))' : 'transparent';
    b.style.color = active ? '#060d24' : 'var(--dim)';
    b.style.borderColor = active ? 'transparent' : 'rgba(255,255,255,0.15)';
  });
  fmtCard.appendChild(fmtBtns);
  body.appendChild(fmtCard);

  // Dynamic section: fondo + fields
  const dynamicDiv = document.createElement('div');
  dynamicDiv.id = 'form-dynamic';
  body.appendChild(dynamicDiv);
  buildDynamicSection(config, formState.selectedFormat, dynamicDiv);

  // Render button
  const renderCard = makeCard('');
  const status = document.createElement('div');
  status.className = 'form-status'; status.id = 'form-status';
  const btn = document.createElement('button');
  btn.className = 'render-btn'; btn.id = 'form-render-btn'; btn.textContent = 'GENERAR IMAGEN';
  const img = document.createElement('img');
  img.id = 'form-result-img';
  const dl = document.createElement('a');
  dl.id = 'form-dl'; dl.download = 'menu.png'; dl.textContent = '⬇ Descargar PNG';
  renderCard.append(status, btn, img, dl);
  body.appendChild(renderCard);

  btn.addEventListener('click', () => renderForm(config, status, btn, img, dl));
}

async function renderForm(config, statusEl, btn, imgEl, dlEl) {
  const fmt = formState.selectedFormat ?? 'story';
  const fmtConfig = getFmtConfig(config, fmt);
  const fondo_b64 = formState.fondo_b64 || fmtConfig.fondo_b64;
  if (!fondo_b64) { statusEl.textContent = '⚠ Sube una imagen de fondo'; statusEl.className = 'form-status err'; return; }

  btn.disabled = true; statusEl.textContent = 'Generando...'; statusEl.className = 'form-status';

  const filledBlocks = (fmtConfig.blocks ?? []).map(b => {
    let content = b.type === 'static' ? b.content : (document.getElementById(`ff-${b.key}`)?.value || '');
    if (b.multiline) content = content.split('\n').filter(s => s.trim());
    return { x: b.x, y: b.y, w: b.w, align: b.align, content, font_family: b.font_family, font_size: b.font_size, text_color: b.text_color };
  });

  const body = {
    fondo_b64, formato: fmt,
    letter_spacing: config.letter_spacing,
    blocks: filledBlocks,
  };

  try {
    const res = await api('/api/render', { method: 'POST', body: JSON.stringify(body) });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    imgEl.src = url; imgEl.style.display = 'block';
    dlEl.href = url; dlEl.style.display = 'block';
    statusEl.textContent = '✓ Imagen generada'; statusEl.className = 'form-status ok';
    showEmailSection(body, currentTemplate.name);
    showIGSection(body, currentTemplate.name);
  } catch (err) {
    statusEl.textContent = '❌ ' + err.message; statusEl.className = 'form-status err';
  } finally {
    btn.disabled = false;
  }
}

// ===== INSTAGRAM =====
async function loadIgStatus() {
  const res  = await api('/api/instagram/status');
  const data = await res.json();
  const el   = document.getElementById('ig-header');
  if (data.connected) {
    el.innerHTML = `
      <span style="font-size:11px;color:var(--dim);">IG: <strong style="color:var(--accent-dim);">@${data.username}</strong></span>
      <button class="hdr-btn" id="btn-ig-disconnect">Desconectar IG</button>`;
    document.getElementById('btn-ig-disconnect').addEventListener('click', disconnectIG);
  } else {
    el.innerHTML = `<button class="hdr-btn" onclick="connectIG()">Conectar Instagram</button>`;
  }
}

function connectIG() { window.location.href = '/api/instagram/connect'; }

async function disconnectIG() {
  if (!confirm('¿Desconectar Instagram?')) return;
  await api('/api/instagram/disconnect', { method: 'DELETE' });
  loadIgStatus();
}

async function showIGSection(renderConfig, templateName) {
  const res  = await api('/api/instagram/status');
  const data = await res.json();
  const body = document.getElementById('ig-section-body');
  document.getElementById('ig-section').style.display = 'block';

  if (!data.connected) {
    body.innerHTML = `
      <p style="font-size:12px;color:var(--dim);margin-bottom:10px;">Conecta tu cuenta de Instagram para publicar directamente en Stories.</p>
      <button class="email-send-btn" style="background:linear-gradient(135deg,#833ab4,#e1306c,#fd1d1d);" onclick="connectIG()">CONECTAR INSTAGRAM</button>`;
    return;
  }

  body.innerHTML = `
    <p style="font-size:12px;color:var(--dim);margin-bottom:10px;">Cuenta: <strong style="color:var(--accent-dim);">@${data.username}</strong></p>
    <div class="email-tabs" style="margin-bottom:10px;">
      <button class="email-tab active" id="ig-tab-now" onclick="switchIgTab('now')">Publicar ahora</button>
      <button class="email-tab" id="ig-tab-sched" onclick="switchIgTab('sched')">Programar</button>
    </div>
    <div class="email-panel active" id="ig-panel-now">
      <div class="form-status" id="ig-status-now"></div>
      <button class="email-send-btn" id="btn-ig-now"
        style="background:linear-gradient(135deg,#833ab4,#e1306c,#fd1d1d);"
        onclick="publishIGNow()">PUBLICAR EN STORIES</button>
    </div>
    <div class="email-panel" id="ig-panel-sched">
      <div class="form-field">
        <label>Fecha y hora de publicación</label>
        <input type="datetime-local" id="ig-sched-at">
      </div>
      <div class="form-status" id="ig-status-sched"></div>
      <button class="email-send-btn" id="btn-ig-sched"
        style="background:linear-gradient(135deg,#833ab4,#e1306c);"
        onclick="scheduleIGPost()">PROGRAMAR PUBLICACIÓN</button>
    </div>`;

  loadIGScheduled();
}

function switchIgTab(tab) {
  document.getElementById('ig-tab-now').classList.toggle('active', tab === 'now');
  document.getElementById('ig-tab-sched').classList.toggle('active', tab === 'sched');
  document.getElementById('ig-panel-now').classList.toggle('active', tab === 'now');
  document.getElementById('ig-panel-sched').classList.toggle('active', tab === 'sched');
}

async function publishIGNow() {
  const btn      = document.getElementById('btn-ig-now');
  const statusEl = document.getElementById('ig-status-now');
  btn.disabled = true; statusEl.textContent = 'Publicando...'; statusEl.className = 'form-status';
  try {
    const res = await api('/api/instagram/publish', {
      method: 'POST',
      body: JSON.stringify({ render_config: currentRenderConfig, template_name: currentTemplateName })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
    const data = await res.json();
    statusEl.innerHTML = `✓ Publicado · <a href="${data.postUrl}" target="_blank" style="color:var(--accent-dim);">Ver en Instagram</a>`;
    statusEl.className = 'form-status ok';
  } catch (err) {
    statusEl.textContent = '❌ ' + err.message; statusEl.className = 'form-status err';
  } finally {
    btn.disabled = false;
  }
}

async function scheduleIGPost() {
  const scheduledAt = document.getElementById('ig-sched-at').value;
  const statusEl    = document.getElementById('ig-status-sched');
  const btn         = document.getElementById('btn-ig-sched');
  if (!scheduledAt) { statusEl.textContent = '⚠ Selecciona fecha y hora'; statusEl.className = 'form-status err'; return; }
  if (new Date(scheduledAt) <= new Date()) { statusEl.textContent = '⚠ La fecha debe ser futura'; statusEl.className = 'form-status err'; return; }
  btn.disabled = true; statusEl.textContent = 'Programando...'; statusEl.className = 'form-status';
  try {
    const res = await api('/api/instagram/schedule', {
      method: 'POST',
      body: JSON.stringify({ render_config: currentRenderConfig, scheduled_at: scheduledAt, template_name: currentTemplateName })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
    statusEl.textContent = '✓ Publicación programada'; statusEl.className = 'form-status ok';
    document.getElementById('ig-sched-at').value = '';
    loadIGScheduled();
  } catch (err) {
    statusEl.textContent = '❌ ' + err.message; statusEl.className = 'form-status err';
  } finally {
    btn.disabled = false;
  }
}

async function loadIGScheduled() {
  const res   = await api('/api/instagram/scheduled');
  const items = await res.json();
  const card  = document.getElementById('ig-scheduled-card');
  const list  = document.getElementById('ig-scheduled-list');
  if (!items.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = '';
  for (const item of items) {
    const dt = new Date(item.scheduled_at).toLocaleString('es-ES', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const el = document.createElement('div');
    el.className = 'scheduled-item';
    el.innerHTML = `
      <div class="scheduled-item-info">
        <strong>${item.template_name || 'Story'}</strong><br>${dt}
      </div>
      <button class="scheduled-cancel" title="Cancelar" onclick="cancelIGScheduled(${item.id}, this)">×</button>`;
    list.appendChild(el);
  }
}

async function cancelIGScheduled(id, btn) {
  btn.disabled = true;
  await api(`/api/instagram/scheduled/${id}`, { method: 'DELETE' });
  loadIGScheduled();
}

// Feedback del callback OAuth
(function checkOAuthResult() {
  const p = new URLSearchParams(location.search);
  if (p.get('ig_connected')) {
    const user = p.get('ig_username') || '';
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;top:70px;right:20px;z-index:999;background:#1a2547;border:1px solid var(--accent-dim);color:var(--accent-dim);padding:10px 16px;border-radius:8px;font-size:13px;font-family:Manrope,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.4);';
    toast.textContent = `✓ Instagram conectado: @${user}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
    history.replaceState({}, '', '/templates.html');
  }
  if (p.get('ig_error')) {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;top:70px;right:20px;z-index:999;background:#1a2547;border:1px solid var(--error);color:var(--error);padding:10px 16px;border-radius:8px;font-size:13px;font-family:Manrope,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.4);';
    toast.textContent = `❌ Error IG: ${p.get('ig_error')}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 6000);
    history.replaceState({}, '', '/templates.html');
  }
})();

// ===== EMAIL =====
let currentRenderConfig = null;
let currentTemplateName = '';

function switchEmailTab(tab) {
  document.getElementById('tab-now').classList.toggle('active', tab === 'now');
  document.getElementById('tab-schedule').classList.toggle('active', tab === 'schedule');
  document.getElementById('panel-now').classList.toggle('active', tab === 'now');
  document.getElementById('panel-schedule').classList.toggle('active', tab === 'schedule');
}

function showEmailSection(renderConfig, templateName) {
  currentRenderConfig = renderConfig;
  currentTemplateName = templateName;
  document.getElementById('email-subject').value = templateName;
  document.getElementById('email-section').style.display = 'block';
  loadScheduledEmails();
}

async function sendEmailNow() {
  const to = document.getElementById('email-to').value.trim();
  const subject = document.getElementById('email-subject').value.trim();
  const statusEl = document.getElementById('email-status-now');
  const btn = document.getElementById('btn-send-now');
  if (!to) { statusEl.textContent = '⚠ Escribe un correo destinatario'; statusEl.className = 'form-status err'; return; }
  btn.disabled = true; statusEl.textContent = 'Enviando...'; statusEl.className = 'form-status';
  try {
    const res = await api('/api/send-email', { method: 'POST', body: JSON.stringify({
      render_config: currentRenderConfig, email_to: to, subject, template_name: currentTemplateName
    })});
    if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
    statusEl.textContent = '✓ Email enviado correctamente'; statusEl.className = 'form-status ok';
  } catch (err) {
    statusEl.textContent = '❌ ' + err.message; statusEl.className = 'form-status err';
  } finally {
    btn.disabled = false;
  }
}

async function scheduleEmail() {
  const to = document.getElementById('email-to').value.trim();
  const subject = document.getElementById('email-subject').value.trim();
  const sendAt = document.getElementById('email-send-at').value;
  const statusEl = document.getElementById('email-status-schedule');
  const btn = document.getElementById('btn-schedule');
  if (!to) { statusEl.textContent = '⚠ Escribe un correo destinatario'; statusEl.className = 'form-status err'; return; }
  if (!sendAt) { statusEl.textContent = '⚠ Selecciona fecha y hora'; statusEl.className = 'form-status err'; return; }
  if (new Date(sendAt) <= new Date()) { statusEl.textContent = '⚠ La fecha debe ser futura'; statusEl.className = 'form-status err'; return; }
  btn.disabled = true; statusEl.textContent = 'Programando...'; statusEl.className = 'form-status';
  try {
    const res = await api('/api/schedule-email', { method: 'POST', body: JSON.stringify({
      render_config: currentRenderConfig, email_to: to, subject, send_at: sendAt, template_name: currentTemplateName
    })});
    if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
    statusEl.textContent = '✓ Envío programado'; statusEl.className = 'form-status ok';
    document.getElementById('email-send-at').value = '';
    loadScheduledEmails();
  } catch (err) {
    statusEl.textContent = '❌ ' + err.message; statusEl.className = 'form-status err';
  } finally {
    btn.disabled = false;
  }
}

async function loadScheduledEmails() {
  const res = await api('/api/scheduled-emails');
  const items = await res.json();
  const card = document.getElementById('scheduled-card');
  const list = document.getElementById('scheduled-list');
  if (!items.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = '';
  for (const item of items) {
    const dt = new Date(item.send_at).toLocaleString('es-ES', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const el = document.createElement('div');
    el.className = 'scheduled-item';
    el.innerHTML = `
      <div class="scheduled-item-info">
        <strong>${item.template_name || 'Menú'}</strong><br>
        Para: ${item.email_to} · ${dt}
      </div>
      <button class="scheduled-cancel" title="Cancelar" onclick="cancelScheduled(${item.id}, this)">×</button>`;
    list.appendChild(el);
  }
}

async function cancelScheduled(id, btn) {
  btn.disabled = true;
  await api(`/api/scheduled-emails/${id}`, { method: 'DELETE' });
  loadScheduledEmails();
}

// ===== UTILS =====
function makeCard(title) {
  const card = document.createElement('div');
  card.className = 'form-card';
  if (title) {
    const t = document.createElement('div');
    t.className = 'form-card-title'; t.textContent = title;
    card.appendChild(t);
  }
  return card;
}
function field(label, inputHtml) {
  const d = document.createElement('div');
  d.className = 'form-field';
  d.innerHTML = `<label>${label}</label>${inputHtml}`;
  return d;
}
function toB64(file) {
  return new Promise(r => {
    const fr = new FileReader();
    fr.onload = e => r(e.target.result.split(',')[1]);
    fr.readAsDataURL(file);
  });
}
